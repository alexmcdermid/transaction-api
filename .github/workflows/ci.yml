# noinspection YAMLSchemaValidation,GithubUnresolvedReference
name: CI

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run tests
        run: mvn -B -ntp test
      - name: Build backend image for scan
        run: docker build -t transaction-api:${{ github.sha }} -f Dockerfile .
      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: transaction-api:${{ github.sha }}
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  deploy-pr-dev:
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: dev-app-runner-backend
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Resume dev App Runner services
        env:
          DEV_FRONTEND_SERVICE_ARN: ${{ secrets.DEV_FRONTEND_SERVICE_ARN }}
          DEV_BACKEND_SERVICE_ARN: ${{ secrets.DEV_BACKEND_SERVICE_ARN }}
        run: |
          set -euo pipefail
          bash .github/scripts/apprunner-lifecycle.sh resume "${DEV_BACKEND_SERVICE_ARN}" "${DEV_FRONTEND_SERVICE_ARN}"
      - name: Build and push PR backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.DEV_ECR_TRANSACTION_API_REPO }}
          IMAGE_TAG: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" -f Dockerfile .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
      - name: Deploy PR backend to App Runner dev
        env:
          SERVICE_ARN: ${{ secrets.DEV_BACKEND_SERVICE_ARN }}
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.DEV_ECR_TRANSACTION_API_REPO }}:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          APP_SECURITY_ALLOWED_EMAILS: ${{ secrets.DEV_ALLOWED_EMAILS }}
          APP_SECURITY_ADMIN_EMAILS: ${{ secrets.DEV_ADMIN_EMAILS }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.DEV_CORS_ALLOWED_ORIGINS }}
          APP_SECURITY_JWT_ENABLED: "true"
          APP_SECURITY_ALLOW_HEADER_AUTH: "false"
          APP_SECURITY_JWT_ISSUER_URI: "https://accounts.google.com"
          APP_SECURITY_JWT_AUDIENCE: ${{ secrets.DEV_GOOGLE_CLIENT_ID }}
          APP_SECURITY_JWT_JWK_SOURCE: "dynamo"
          APP_SECURITY_JWT_JWS_ALGORITHMS: "RS256"
          APP_SECURITY_JWT_JWK_REFRESH_INTERVAL: "PT15M"
          APP_SECURITY_JWT_DYNAMO_TABLE: "AuthJwks"
          APP_SECURITY_JWT_DYNAMO_KEY_ATTRIBUTE: "provider"
          APP_SECURITY_JWT_DYNAMO_KEY: "google"
          APP_SECURITY_JWT_DYNAMO_JWK_SET_ATTRIBUTE: "jwks"
          APP_SECURITY_JWT_DYNAMO_EXPIRES_AT_ATTRIBUTE: "expiresAt"
          APP_SECURITY_JWT_DYNAMO_MAX_STALE: "PT72H"
          APP_FX_SOURCE: "dynamo"
          APP_AWS_REGION: ${{ secrets.AWS_REGION }}
          APP_FX_DYNAMO_TABLE: "ExchangeRates"
        run: |
          set -euo pipefail
          python - <<'PY' > /tmp/apprunner-backend.json
          import json
          import os
          
          def required(name):
              value = os.environ.get(name, "").strip()
              if not value:
                  raise SystemExit(f"Missing required env var: {name}")
              return value

          def optional(name):
              return os.environ.get(name, "").strip()
          
          env = {
              "DATABASE_URL": required("DATABASE_URL"),
              "APP_CORS_ALLOWED_ORIGINS": required("APP_CORS_ALLOWED_ORIGINS"),
              "APP_SECURITY_JWT_ENABLED": required("APP_SECURITY_JWT_ENABLED"),
              "APP_SECURITY_ALLOW_HEADER_AUTH": required("APP_SECURITY_ALLOW_HEADER_AUTH"),
              "APP_SECURITY_JWT_ISSUER_URI": required("APP_SECURITY_JWT_ISSUER_URI"),
              "APP_SECURITY_JWT_AUDIENCE": required("APP_SECURITY_JWT_AUDIENCE"),
              "APP_SECURITY_JWT_JWK_SOURCE": required("APP_SECURITY_JWT_JWK_SOURCE"),
              "APP_SECURITY_JWT_JWS_ALGORITHMS": required("APP_SECURITY_JWT_JWS_ALGORITHMS"),
              "APP_SECURITY_JWT_JWK_REFRESH_INTERVAL": required("APP_SECURITY_JWT_JWK_REFRESH_INTERVAL"),
              "APP_SECURITY_JWT_DYNAMO_TABLE": required("APP_SECURITY_JWT_DYNAMO_TABLE"),
              "APP_SECURITY_JWT_DYNAMO_KEY_ATTRIBUTE": required("APP_SECURITY_JWT_DYNAMO_KEY_ATTRIBUTE"),
              "APP_SECURITY_JWT_DYNAMO_KEY": required("APP_SECURITY_JWT_DYNAMO_KEY"),
              "APP_SECURITY_JWT_DYNAMO_JWK_SET_ATTRIBUTE": required("APP_SECURITY_JWT_DYNAMO_JWK_SET_ATTRIBUTE"),
              "APP_SECURITY_JWT_DYNAMO_EXPIRES_AT_ATTRIBUTE": required("APP_SECURITY_JWT_DYNAMO_EXPIRES_AT_ATTRIBUTE"),
              "APP_SECURITY_JWT_DYNAMO_MAX_STALE": required("APP_SECURITY_JWT_DYNAMO_MAX_STALE"),
              "APP_FX_SOURCE": required("APP_FX_SOURCE"),
              "APP_AWS_REGION": required("APP_AWS_REGION"),
              "APP_FX_DYNAMO_TABLE": required("APP_FX_DYNAMO_TABLE"),
          }
          
          optional = {
              "APP_SECURITY_ALLOWED_EMAILS": optional("APP_SECURITY_ALLOWED_EMAILS"),
              "APP_SECURITY_ADMIN_EMAILS": optional("APP_SECURITY_ADMIN_EMAILS"),
          }
          env.update({k: v for k, v in optional.items() if v})
          
          source_config = {
              "ImageRepository": {
                  "ImageIdentifier": required("IMAGE"),
                  "ImageRepositoryType": "ECR",
                  "ImageConfiguration": {
                      "Port": "8080",
                      "RuntimeEnvironmentVariables": env,
                  },
              },
          }
          
          print(json.dumps(source_config))
          PY
          aws apprunner update-service --service-arn "${SERVICE_ARN}" --source-configuration file:///tmp/apprunner-backend.json
          bash .github/scripts/apprunner-lifecycle.sh wait-running "${SERVICE_ARN}"
