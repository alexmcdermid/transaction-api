# noinspection YAMLSchemaValidation,GithubUnresolvedReference
name: Dev App Runner Cleanup

on:
  pull_request_target:
    branches: [ "main" ]
    types: [closed]

env:
  FRONTEND_REPOSITORY: alexmcdermid/tradingView
  BACKEND_REPOSITORY: alexmcdermid/transaction-api

jobs:
  pause-when-idle:
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: dev-app-runner-backend
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Count open PRs using shared dev
        id: open-prs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PR_READ_TOKEN || github.token }}
        run: |
          set -euo pipefail
          bash .github/scripts/github-open-pr-count.sh "${FRONTEND_REPOSITORY}" "${BACKEND_REPOSITORY}"
      - name: Pause dev App Runner services when idle
        if: steps.open-prs.outputs.count == '0'
        env:
          DEV_FRONTEND_SERVICE_ARN: ${{ secrets.DEV_FRONTEND_SERVICE_ARN }}
          DEV_BACKEND_SERVICE_ARN: ${{ secrets.DEV_BACKEND_SERVICE_ARN }}
        run: |
          set -euo pipefail
          bash .github/scripts/apprunner-lifecycle.sh pause "${DEV_FRONTEND_SERVICE_ARN}" "${DEV_BACKEND_SERVICE_ARN}"
